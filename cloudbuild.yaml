options:
  logging: CLOUD_LOGGING_ONLY

steps:

# Build SHA image
- name: 'gcr.io/cloud-builders/docker'
  dir: '${_SOURCE_DIR}'
  args:
    - build
    - -t
    - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPOSITORY}/${_IMAGE_NAME}:$SHORT_SHA'
    - .

# Tag latest
- name: 'gcr.io/cloud-builders/docker'
  args:
    - tag
    - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPOSITORY}/${_IMAGE_NAME}:$SHORT_SHA'
    - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPOSITORY}/${_IMAGE_NAME}:latest'

# Push SHA
- name: 'gcr.io/cloud-builders/docker'
  args:
    - push
    - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPOSITORY}/${_IMAGE_NAME}:$SHORT_SHA'

# Push latest
- name: 'gcr.io/cloud-builders/docker'
  args:
    - push
    - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPOSITORY}/${_IMAGE_NAME}:latest'

- name: 'ubuntu'
  dir: '${_SOURCE_DIR}'
  entrypoint: 'bash'
  args:
    - '-c'
    - |
      echo "SOURCE_DIR=${_SOURCE_DIR}"
      echo "ENV_FILE=${_ENV_FILE}"
      pwd
      ls -la
      cat ${_ENV_FILE}

# Deploy
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  entrypoint: gcloud
  args:
    - run
    - deploy
    - '${_SERVICE_NAME}'
    - '--image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPOSITORY}/${_IMAGE_NAME}:$SHORT_SHA'
    - '--region=${_REGION}'
    - '--service-account=${_SERVICE_ACCOUNT}'
    - '--env-vars-file=${_SOURCE_DIR}/${_ENV_FILE}'
